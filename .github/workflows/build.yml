name: 🚀 编译 ImmortalWrt 24.10 (Build)

on:
  workflow_dispatch:
    inputs:
      owner:
        description: 'ImmortalWrt 仓库拥有者 (Owner)'
        type: string
        required: true
        default: 'immortalwrt'
      repo:
        description: 'ImmortalWrt 仓库名称 (Repository)'
        type: string
        required: true
        default: 'immortalwrt'
      branch:
        description: 'ImmortalWrt 源码分支 (Branch)'
        type: string
        required: true
        default: 'openwrt-24.10'
      multithreading:
        description: '开启多线程编译 (Enable multithreading)'
        type: boolean
        required: true
        default: true
      ssh:
        description: '使用 SSH 进入编译环境 (Open SSH session)'
        type: boolean
        required: true
        default: false

permissions:
  contents: read

env:
  TZ: Asia/Shanghai
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    if: ${{ inputs.ssh == false }}
    name: 🚀 编译 (Build)
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 检查磁盘空间 (Check disk space)
        run: df -h

      - name: 安装编译依赖 (Install build dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm \
            lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto \
            xxd zlib1g-dev zstd
          sudo apt-get clean
          df -h

      - name: 克隆当前配置仓库 (Checkout configuration repository)
        uses: actions/checkout@v4

      - name: 检查必需配置文件 (Validate required files)
        run: |
          test -f .config || { echo '错误：仓库根目录缺少 .config'; exit 1; }
          test -f feeds.conf.default || { echo '错误：仓库根目录缺少 feeds.conf.default'; exit 1; }
          test -f diy.sh || { echo '错误：仓库根目录缺少 diy.sh'; exit 1; }

      - name: 克隆 ImmortalWrt 24.10 源码 (Checkout ImmortalWrt source)
        uses: actions/checkout@v4
        with:
          repository: '${{ inputs.owner }}/${{ inputs.repo }}'
          ref: '${{ inputs.branch }}'
          path: ImmortalWrt
          fetch-depth: 1

      - name: 导入配置文件 (Import configuration files)
        run: |
          cp -f .config feeds.conf.default diy.sh ImmortalWrt/
          chmod +x ImmortalWrt/diy.sh

      - name: 执行自定义脚本 (Run diy.sh)
        working-directory: ImmortalWrt
        run: ./diy.sh

      - name: 更新并安装 Feeds (Update and install feeds)
        working-directory: ImmortalWrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 展开并校验配置 (Expand and validate config)
        working-directory: ImmortalWrt
        run: |
          make defconfig
          echo '目标平台配置：'
          grep -E '^CONFIG_TARGET_(x86|x86_64|x86_64_DEVICE_generic)=' .config || true

      - name: 上传最终编译配置 (Upload resolved build config)
        uses: actions/upload-artifact@v4
        with:
          name: config-before-build
          path: |
            ImmortalWrt/.config
            ImmortalWrt/feeds.conf.default
            ImmortalWrt/diy.sh
          retention-days: 7
          if-no-files-found: error

      - name: 下载源码包 (Download source archives)
        working-directory: ImmortalWrt
        run: |
          make download -j8 || make download -j1 V=s
          find dl -size -1024c -print -delete || true

      - name: 多线程编译 ImmortalWrt (Multithreaded build)
        if: ${{ inputs.multithreading == true }}
        working-directory: ImmortalWrt
        run: |
          make -j"$(nproc)" V=s || {
            echo '多线程编译失败，改用单线程输出详细错误日志。'
            make -j1 V=s
          }

      - name: 单线程编译 ImmortalWrt (Single-threaded build)
        if: ${{ inputs.multithreading == false }}
        working-directory: ImmortalWrt
        run: make -j1 V=s

      - name: 显示生成的固件 (List generated images)
        working-directory: ImmortalWrt
        run: find bin/targets -maxdepth 4 -type f -printf '%p\n' | sort

      - name: 上传编译结果 (Upload firmware artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-24.10-x86_64-build-result
          path: ImmortalWrt/bin/targets
          retention-days: 7
          if-no-files-found: error

  build-ssh:
    if: ${{ inputs.ssh == true }}
    name: 🚀 编译并开启 SSH (Build with SSH)
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 检查磁盘空间 (Check disk space)
        run: df -h

      - name: 安装编译依赖 (Install build dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf haveged help2man intltool \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm \
            lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto \
            xxd zlib1g-dev zstd
          sudo apt-get clean
          df -h

      - name: 克隆当前配置仓库 (Checkout configuration repository)
        uses: actions/checkout@v4

      - name: 检查必需配置文件 (Validate required files)
        run: |
          test -f .config || { echo '错误：仓库根目录缺少 .config'; exit 1; }
          test -f feeds.conf.default || { echo '错误：仓库根目录缺少 feeds.conf.default'; exit 1; }
          test -f diy.sh || { echo '错误：仓库根目录缺少 diy.sh'; exit 1; }

      - name: 克隆 ImmortalWrt 24.10 源码 (Checkout ImmortalWrt source)
        uses: actions/checkout@v4
        with:
          repository: '${{ inputs.owner }}/${{ inputs.repo }}'
          ref: '${{ inputs.branch }}'
          path: ImmortalWrt
          fetch-depth: 1

      - name: 导入配置文件 (Import configuration files)
        run: |
          cp -f .config feeds.conf.default diy.sh ImmortalWrt/
          chmod +x ImmortalWrt/diy.sh

      - name: 执行自定义脚本 (Run diy.sh)
        working-directory: ImmortalWrt
        run: ./diy.sh

      - name: 更新并安装 Feeds (Update and install feeds)
        working-directory: ImmortalWrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig

      - name: 开启 SSH 服务 (Start SSH session)
        uses: lhotari/action-upterm@v1
        with:
          wait-timeout-minutes: 60

      - name: SSH 结束后重新校验配置 (Validate config after SSH)
        working-directory: ImmortalWrt
        run: make defconfig

      - name: 上传最终编译配置 (Upload resolved build config)
        uses: actions/upload-artifact@v4
        with:
          name: config-before-build-ssh
          path: |
            ImmortalWrt/.config
            ImmortalWrt/feeds.conf.default
            ImmortalWrt/diy.sh
          retention-days: 7
          if-no-files-found: error

      - name: 下载源码包 (Download source archives)
        working-directory: ImmortalWrt
        run: |
          make download -j8 || make download -j1 V=s
          find dl -size -1024c -print -delete || true

      - name: 多线程编译 ImmortalWrt (Multithreaded build)
        if: ${{ inputs.multithreading == true }}
        working-directory: ImmortalWrt
        run: |
          make -j"$(nproc)" V=s || {
            echo '多线程编译失败，改用单线程输出详细错误日志。'
            make -j1 V=s
          }

      - name: 单线程编译 ImmortalWrt (Single-threaded build)
        if: ${{ inputs.multithreading == false }}
        working-directory: ImmortalWrt
        run: make -j1 V=s

      - name: 显示生成的固件 (List generated images)
        working-directory: ImmortalWrt
        run: find bin/targets -maxdepth 4 -type f -printf '%p\n' | sort

      - name: 上传编译结果 (Upload firmware artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-24.10-x86_64-build-result
          path: ImmortalWrt/bin/targets
          retention-days: 7
          if-no-files-found: error
